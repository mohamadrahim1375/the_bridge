name: Connect-to-Server
on: 
  workflow_dispatch: # یعنی هر وقت خودمان خواستیم دکمه را بزنیم

jobs:
  build:
    runs-on: ubuntu-latest # استفاده از سرورهای لینوکسی گیت‌هاب
    steps:
    - name: Start Tunnel
      run: |
        # دانلود ابزار مورد نیاز
        curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
        chmod +x cloudflared
        
        # در اینجا ما یک تونل موقت می‌سازیم
        # این کد ترافیک سرور گیت‌هاب را به آی‌پی سرور شما می‌فرستد
        ./cloudflared access tcp --hostname 84.32.230.123 --url localhost:443
